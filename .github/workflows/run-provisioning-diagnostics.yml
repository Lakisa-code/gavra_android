name: iOS Provisioning Diagnostics (branch-trigger)

on:
  push:
    branches:
      - ci/ios-diagnostics-20260309

jobs:
  diagnostics:
    name: Diagnostics: certs & provisioning
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner: $(uname -a)"
          echo "PWD: $(pwd)"

      - name: Diagnostics: certificates & provisioning profiles
        run: |
          echo "== Show provisioning profiles dir =="
          ls -la /Users/runner/Library/MobileDevice/Provisioning\ Profiles || true
          echo "== Show certificates directory =="
          ls -la /Users/runner/Library/Developer/Xcode/UserData/Certificates || true
          echo "== security find-identity =="
          security find-identity -p codesigning -v || true
          echo "== list keychains =="
          security list-keychains || true
          echo "== Check for generated export_options.plist =="
          [ -f $HOME/export_options.plist ] && echo "export_options exists" || echo "no export_options yet"
          echo "== End diagnostics =="
